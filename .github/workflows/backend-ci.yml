name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - run: pip install ".[test,dev]"
      - run: python -m ruff check app tests
      - run: python -m ruff format --check app tests

  typecheck:
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - run: pip install ".[test,dev]"
      - run: python -m mypy --config-file pyproject.toml

  core-coverage:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - run: pip install ".[test,dev]"
      - run: |
          python -m pytest tests -q \
            --cov \
            --cov-config=.coveragerc \
            --cov-report=term \
            --cov-report=xml:coverage.xml
      - uses: actions/upload-artifact@v4
        with:
          name: backend-core-coverage
          path: backend/coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, core-coverage]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: quantlab/backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
