services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: quantlab
      POSTGRES_USER: quantlab
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantlab"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://quantlab:quantlab@db:5432/quantlab
      CORS_ORIGINS: '["http://localhost:3000"]'
      APP_ENV: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    depends_on:
      - backend

secrets:
  db_password:
    file: ./secrets/db_password.txt

volumes:
  pgdata:
